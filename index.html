<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .user-bubble { background-color: #dcf8c6; border-radius: 15px 0 15px 15px; }
        .bot-bubble { background-color: #ffffff; border-radius: 0 15px 15px 15px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #bababa; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <button onclick="toggleSettings()" class="fixed top-4 right-4 z-50 text-white bg-black/20 p-2 rounded-full hover:bg-black/40 transition-colors">⚙️</button>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-[60]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm space-y-4 shadow-xl">
            <h3 class="font-bold text-lg">API Configuration</h3>
            <p class="text-xs text-slate-500">Enter your Gemini API Key. It is saved only on this device.</p>
            <input id="api-key-input" type="password" placeholder="Paste Gemini Key Here" class="w-full p-3 border rounded-xl outline-none focus:border-green-600">
            <button onclick="saveKey()" class="w-full py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 transition-all">Save Key</button>
            <button onclick="toggleSettings()" class="w-full py-2 text-slate-500 text-sm">Cancel</button>
        </div>
    </div>

    <div id="home-page" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-md bg-white p-8 rounded-3xl shadow-2xl space-y-6">
            <div class="text-5xl">👨‍🏫</div>
            <h1 class="text-3xl font-extrabold text-slate-800">AI English Coach</h1>
            <p class="text-slate-600">Improve your fluency with real-time practice.</p>
            <button onclick="startApp()" class="w-full py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-2xl shadow-lg transition-all transform active:scale-95">
                Start Practicing
            </button>
        </div>
    </div>

    <div id="chat-page" class="hidden h-screen flex flex-col max-w-lg mx-auto shadow-2xl overflow-hidden">
        <div class="bg-[#075e54] p-4 flex items-center text-white shadow-md">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl mr-3">👨‍🏫</div>
            <div>
                <h2 class="font-bold">English Teacher AI</h2>
                <p id="status-text" class="text-xs text-green-200">Online</p>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-bg flex flex-col"></div>

        <div class="bg-white p-6 border-t flex flex-col items-center space-y-3">
            <button id="talk-btn" class="w-20 h-20 bg-green-600 rounded-full flex items-center justify-center text-white shadow-xl hover:scale-105 active:scale-90 transition-all border-4 border-white">
                <span id="mic-icon" class="text-3xl">🎤</span>
            </button>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="mic-hint">Tap to Speak</p>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = localStorage.getItem('user_gemini_key') || "";
        
        const homePage = document.getElementById('home-page');
        const chatPage = document.getElementById('chat-page');
        const chatWindow = document.getElementById('chat-window');
        const statusText = document.getElementById('status-text');
        const micHint = document.getElementById('mic-hint');
        const btn = document.getElementById('talk-btn');

        let isRecording = false;
        let finalTranscript = ""; 

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveKey() {
            const newKey = document.getElementById('api-key-input').value;
            if(newKey) {
                localStorage.setItem('user_gemini_key', newKey);
                GEMINI_API_KEY = newKey;
                toggleSettings();
                alert("Key saved!");
            }
        }

        function startApp() {
            if (!GEMINI_API_KEY) {
                toggleSettings();
                return;
            }
            homePage.classList.add('hidden');
            chatPage.classList.remove('hidden');
            addChatMessage("Hello! I'm your English teacher. Tap the mic to start speaking, and tap again when you're finished.", false);
        }

        // --- SPEECH ENGINE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        btn.onclick = () => {
            if (!isRecording) {
                startListening();
            } else {
                stopAndSend();
            }
        };

        function startListening() {
            finalTranscript = ""; 
            try {
                recognition.start();
                isRecording = true;
                btn.classList.replace('bg-green-600', 'bg-red-500');
                micHint.innerText = "Tap to Finish";
                statusText.innerText = "Listening...";
            } catch (e) { console.error(e); }
        }

        function stopAndSend() {
            recognition.stop();
            isRecording = false;
            btn.classList.replace('bg-red-500', 'bg-green-600');
            micHint.innerText = "Tap to Speak";
            
            setTimeout(() => {
                if (finalTranscript.trim().length > 0) {
                    addChatMessage(finalTranscript, true);
                    askGemini(finalTranscript);
                } else {
                    statusText.innerText = "Online";
                }
            }, 600);
        }

recognition.onresult = (event) => {
    // 1. Reset the interim string for EVERY single event trigger
    let interimTranscript = "";
    let finalTranscriptForThisEvent = "";

    // 2. Loop through all results provided by the Android engine
    for (let i = event.resultIndex; i < event.results.length; ++i) {
        const transcript = event.results[i][0].transcript;
        
        if (event.results[i].isFinal) {
            // Only add to the permanent record if the phone is 100% sure
            finalTranscript += transcript;
        } else {
            // Otherwise, keep it in the temporary "guessing" string
            interimTranscript += transcript;
        }
    }

    // 3. Update the UI - this ensures 'thisthis isthis' never happens
    // because we are viewing a 'snapshot' of the current speech, not a growing pile.
    statusText.innerText = "Hearing: " + (finalTranscript + interimTranscript);
};

        recognition.onend = () => {
            if (isRecording) recognition.start(); // Keep alive if Android tries to cut off
        };

        async function askGemini(text) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            statusText.innerText = "Teacher is thinking...";
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are a friendly female English Trainer. The student said: "${text}". Briefly correct grammar and reply in 1-2 friendly sentences. Then, provide a professional alternative. End with a question for the student.` }] }]
                    })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                addChatMessage(reply, false);
                statusText.innerText = "Online";
                speak(reply);
            } catch (err) {
                statusText.innerText = "Error. Check API Key.";
            }
        }

        function addChatMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full mb-4 ${isUser ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] px-4 py-2 shadow-md text-sm ${isUser ? 'user-bubble' : 'bot-bubble'}`;
            bubble.innerText = text;
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha'));
            utterance.voice = femaleVoice || voices[1];
            utterance.rate = 1.0;
            utterance.pitch = 1.15;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
